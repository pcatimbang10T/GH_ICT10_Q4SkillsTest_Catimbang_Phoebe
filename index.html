<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Tracker</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- PyScript -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <py-config>
        packages = ["numpy", "matplotlib"]
    </py-config>

    <style>
        body {
            background: #FFF1D3;
        }

        .card {
            border-radius: 12px;
            border: none;
        }

        .btn-custom {
            background: #FFB090;
            color: #CA5995;
        }

        .btn-custom:hover {
            background: #5D1C6A;
        }

        #output {
            font-weight: bold;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow p-4" style="width: 350px;">
        <h4 class="text-center mb-3">The Attendance Tracker</h4>

        <form onsubmit="return false;">
            <div class="mb-3">
                <label class="form-label">Month</label>
                <select id="month" class="form-select">
                    <option>January</option>
                    <option>February</option>
                    <option>March</option>
                    <option>April</option>
                    <option>May</option>
                    <option>August</option>
                    <option>September</option>
                    <option>October</option>
                    <option>November</option>
                    <option>December</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">The Absences</label>
                <input type="number" id="absences" class="form-control" placeholder="Enter absences">
            </div>

            <button type="button" py-click="displaying" class="btn btn-custom w-100">
                Submit
            </button>
        </form>

        <div id="output" class="mt-3 text-center"></div>
        <div id="graph" class="mt-3"></div>
    </div>

    <py-script src="main.py"></py-script>

</body>
</html>
